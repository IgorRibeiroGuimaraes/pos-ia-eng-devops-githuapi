{{- if .Values.prefect.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "github-pipeline.fullname" . }}-prefect
  labels:
    {{- include "github-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "github-pipeline.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prefect
  template:
    metadata:
      labels:
        {{- include "github-pipeline.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: prefect
    spec:
      automountServiceAccountToken: false
      containers:
        - name: prefect-server
          image: "{{ .Values.prefect.image.repository }}:{{ .Values.prefect.image.tag }}"
          imagePullPolicy: {{ .Values.prefect.image.pullPolicy }}
          command: ["prefect", "server", "start", "--host", "0.0.0.0"]
          ports:
            - name: http
              containerPort: {{ .Values.prefect.port }}
              protocol: TCP
          env:
            - name: PREFECT_SERVER_API_HOST
              value: "0.0.0.0"
          resources:
            {{- toYaml .Values.prefect.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  labels:
    {{- include "github-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: prefect
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.prefect.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "github-pipeline.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prefect
{{- end }}
