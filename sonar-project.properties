sonar.projectKey=IgorRibeiroGuimaraes_-pos-ia-eng-devops-githuapi
sonar.organization=igorribeiroguimaraes

sonar.projectName=GitHub Data Pipeline API
sonar.projectVersion=0.1.0

# Código-fonte
sonar.sources=src
sonar.tests=tests
sonar.language=py
sonar.sourceEncoding=UTF-8

# Cobertura de testes (gerada pelo pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusões
sonar.exclusions=**/__pycache__/**,**/*.pyc,alembic/versions/**,.venv/**,helm/**/charts/**
sonar.test.exclusions=tests/**

# Versão do Python
sonar.python.version=3.12

# Suprime regra de protocolo clear-text para templates Helm internos
# (URLs http:// são intra-cluster, não tráfego externo)
sonar.issue.ignore.multicriteria=helm1
sonar.issue.ignore.multicriteria.helm1.ruleKey=kubernetes:S6596
sonar.issue.ignore.multicriteria.helm1.resourceKey=helm/**/configmap.yaml
